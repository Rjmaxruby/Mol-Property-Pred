<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molecular Toxicity Predictor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --toxic: #f85149;
      --safe: #3fb950;
      --warn: #d29922;
      --low-conf: #484f58;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 900px;
      margin: 0 auto 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    header p {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    .input-row select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.65rem 0.75rem;
      outline: none;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0d1117;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .examples {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .examples span {
      color: var(--accent);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      margin-right: 1rem;
    }

    .examples span:hover { text-decoration: underline; }

    .error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: 6px;
      color: var(--toxic);
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .results { display: none; }

    .mol-header {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      margin-bottom: 2rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .mol-image {
      width: 180px;
      height: 180px;
      flex-shrink: 0;
      border-radius: 6px;
      background: #ffffff08;
      border: 1px solid var(--border);
      object-fit: contain;
    }

    .mol-meta { flex: 1; }

    .mol-meta .label {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }

    .mol-meta .smiles {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 1rem;
    }

    .mol-stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    
    .stat .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .stat .unit {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .note-box {
      font-size: 0.75rem;
      color: var(--warn);
      background: rgba(210, 153, 34, 0.08);
      border: 1px solid rgba(210, 153, 34, 0.25);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
    }

    .section-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    .predictions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 600px) {
      .predictions-grid { grid-template-columns: 1fr; }
      .mol-header { flex-direction: column; }
      .mol-image { width: 100%; height: 200px; }
    }

    .pred-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem 1rem;
      position: relative;
      overflow: hidden;
    }

    .pred-card.toxic { border-left: 3px solid var(--toxic); }
    .pred-card.safe { border-left: 3px solid var(--safe); }

    .pred-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .pred-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
    }

    .pred-badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-toxic { background: rgba(248,81,73,0.15); color: var(--toxic); }
    .badge-safe { background: rgba(63,185,80,0.12); color: var(--safe); }

    .pred-desc {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    .pred-bar-wrap {
      background: #ffffff0a;
      border-radius: 3px;
      height: 4px;
      margin-bottom: 0.4rem;
      overflow: hidden;
    }

    .pred-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .bar-toxic { background: var(--toxic); }
    .bar-safe { background: var(--safe); }

    .pred-footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
    }

    .pred-prob { color: var(--text); font-family: 'IBM Plex Mono', monospace; }

    .conf-high { color: var(--safe); }
    .conf-medium { color: var(--warn); }
    .conf-low { color: var(--muted); }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 2rem auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <h1>mol-tox-predictor</h1>
  <p>Multi-task GNN · Tox21 · 12 biological targets · 0.7967 mean AUC-ROC</p>
</header>

<div class="container">
  <div class="input-row">
    <input type="text" id="query" placeholder="caffeine  or  CC(=O)Oc1ccccc1C(=O)O" />
    <select id="inputType">
      <option value="auto">auto-detect</option>
      <option value="name">name</option>
      <option value="smiles">SMILES</option>
    </select>
    <button id="predictBtn" onclick="predict()">Predict</button>
  </div>

  <div class="examples">
    Try:
    <span onclick="setExample('caffeine', 'name')">caffeine</span>
    <span onclick="setExample('aspirin', 'name')">aspirin</span>
    <span onclick="setExample('CC1=CC(=C(C=C1)Cl)NC2=NC=CC(=N2)NC3=CC=CC(=C3)S(=O)(=O)N', 'smiles')">dasatinib (SMILES)</span>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="spinner" id="spinner"></div>

  <div class="results" id="results">
    <div class="mol-header">
      <img class="mol-image" id="molImg" src="" alt="Molecule structure" />
      <div class="mol-meta">
        <div class="label">Resolved SMILES</div>
        <div class="smiles" id="smilesOut"></div>
        <div class="mol-stats">
          <div class="stat">
            <div class="num" id="atomCount">—</div>
            <div class="unit">atoms</div>
          </div>
          <div class="stat">
            <div class="num" id="bondCount">—</div>
            <div class="unit">bonds</div>
          </div>
          <div class="stat">
            <div class="num" id="toxicCount">—</div>
            <div class="unit">targets flagged</div>
          </div>
        </div>
        <div class="note-box" id="noteBox"></div>
      </div>
    </div>

    <div class="section-label">Toxicity predictions — 12 Tox21 targets</div>
    <div class="predictions-grid" id="predsGrid"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';

  function setExample(val, type) {
    document.getElementById('query').value = val;
    document.getElementById('inputType').value = type;
  }

  function show(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }

  async function predict() {
    const query = document.getElementById('query').value.trim();
    const inputType = document.getElementById('inputType').value;
    if (!query) return;

    hide('results');
    hide('errorBox');
    show('spinner');
    document.getElementById('predictBtn').disabled = true;

    try {
      const res = await fetch(`${API}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: query, input_type: inputType })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || `Error ${res.status}`);
      }

      render(data);
    } catch (e) {
      const box = document.getElementById('errorBox');
      box.textContent = e.message;
      show('errorBox');
    } finally {
      hide('spinner');
      document.getElementById('predictBtn').disabled = false;
    }
  }

  function render(data) {
    document.getElementById('molImg').src = `data:image/png;base64,${data.molecule_image}`;
    document.getElementById('smilesOut').textContent = data.resolved_smiles;
    document.getElementById('atomCount').textContent = data.num_atoms;
    document.getElementById('bondCount').textContent = data.num_bonds;
    document.getElementById('noteBox').textContent = data.note;

    const preds = data.predictions;
    const toxicCount = Object.values(preds).filter(p => p.toxic).length;
    document.getElementById('toxicCount').textContent = toxicCount;

    const grid = document.getElementById('predsGrid');
    grid.innerHTML = '';

    for (const [target, p] of Object.entries(preds)) {
      const card = document.createElement('div');
      card.className = `pred-card ${p.toxic ? 'toxic' : 'safe'}`;

      const confClass = `conf-${p.confidence}`;
      const barClass = p.toxic ? 'bar-toxic' : 'bar-safe';
      const badgeClass = p.toxic ? 'badge-toxic' : 'badge-safe';
      const badgeText = p.toxic ? 'Toxic' : 'Safe';

      card.innerHTML = `
        <div class="pred-top">
          <div class="pred-name">${target}</div>
          <span class="pred-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="pred-desc">${p.description}</div>
        <div class="pred-bar-wrap">
          <div class="pred-bar ${barClass}" style="width: ${(p.probability * 100).toFixed(1)}%"></div>
        </div>
        <div class="pred-footer">
          <span class="pred-prob">${(p.probability * 100).toFixed(1)}% probability</span>
          <span class="${confClass}">${p.confidence} confidence · AUC ${p.model_auc}</span>
        </div>
      `;
      grid.appendChild(card);
    }

    show('results');
  }

  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') predict();
  });
</script>
</body>
</html>
